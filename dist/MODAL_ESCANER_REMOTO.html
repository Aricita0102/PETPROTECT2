<div class="modal-backdrop-premium" id="escanerOverlay" aria-hidden="true" style="display:none; align-items:center; justify-content:center; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(3,47,64,0.6); z-index:1500; backdrop-filter:blur(3px);">
    <div class="ventana-modal-bento" style="width: 400px; max-width: 90vw; background: #FFFFFF; border-radius: 20px; padding: 24px; position: relative; box-shadow: 0 10px 40px rgba(0,0,0,0.1);">
        
        <button type="button" class="boton-cerrar-modal-bento" id="btnCerrarEscanerModal" aria-label="Cerrar escáner" style="position: absolute; top: 16px; right: 16px; background: none; border: none; cursor: pointer; color: #6b7a80;">
            <span class="material-symbols-rounded">close</span>
        </button>

        <div style="text-align: center; margin-bottom: 20px;">
            <div style="width: 48px; height: 48px; border-radius: 12px; background: #FFF4E9; color: #F27405; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px;">
                <span class="material-symbols-rounded" style="font-size: 24px;">qr_code_scanner</span>
            </div>
            <h2 style="font-family: 'Playfair Display', serif; font-size: 22px; color: #032F40; font-weight: 700; margin-bottom: 4px;">Escáner Móvil</h2>
            <p style="font-size: 13px; color: #6b7a80;">Usa tu celular como lector de código de barras.</p>
        </div>

        <div style="background: #eef2f3; border-radius: 16px; padding: 24px; text-align: center; margin-bottom: 20px;">
            <!-- Contenedor del QR dinámico -->
            <div id="escanerQrContainer" style="background: #FFFFFF; padding: 16px; border-radius: 12px; display: inline-block; box-shadow: 0 2px 8px rgba(0,0,0,0.05);">
                <canvas id="escanerQrCanvas" width="180" height="180"></canvas>
            </div>
            <p style="font-size: 12px; font-weight: 600; color: #032F40; margin-top: 16px; letter-spacing: 1px;">PIN: <span id="escanerPinTxt" style="color: #F27405;">---</span></p>
        </div>

        <div style="display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 13px; font-weight: 600;">
            <span class="material-symbols-rounded" id="escanerStatusIcon" style="font-size: 18px; color: #F27405;">pending</span>
            <span id="escanerStatusTxt" style="color: #6b7a80;">Esperando conexión...</span>
        </div>

        <!-- Indicador de escaneo (oculto por defecto) -->
        <div id="escanerFeedback" style="display: none; margin-top: 16px; padding: 12px; background: #E8F5E9; border: 1px solid #C8E6C9; border-radius: 8px; text-align: center;">
            <span style="font-size: 13px; font-weight: bold; color: #2E7D32;">¡Código recibido!</span>
            <div id="escanerFeedbackCode" style="font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #1B5E20; margin-top: 4px;"></div>
        </div>
    </div>
</div>
