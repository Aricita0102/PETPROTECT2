<!-- DEPENDENCIAS UI/UX: Carga dinámica de tipografías e íconos -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />

<div class="modulo-medico-interno" id="vista-expedientes">

    <header class="hero-clinico no-imprimir">
        <div class="hero-contenido">
            
            <div class="bloque-titulos">
                <h1 class="titulo-hero">Expedientes Veterinarios</h1>
                <div style="display: flex; gap: 20px; margin-top: 8px; color: rgba(255, 255, 255, 0.85); font-size: 0.9rem; align-items: center;">
                    <div style="display: flex; align-items: center; gap: 5px;">
                        <span>Búsqueda y gestión de identidad clínica</span>
                    </div>
                </div>
            </div>
            
            <div class="hero-acciones grupo-busqueda-proactiva">
                <search class="input-con-icono buscador-predictivo" aria-label="Búsqueda de pacientes" style="position: relative;">
                    <span class="material-symbols-rounded" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--texto-gris); pointer-events: none; z-index: 2; font-size: 22px;">search</span>
                    <input type="search" id="inBuscarPaciente" class="entrada-texto-hero" 
                        placeholder="Buscar paciente, tutor o ID..." 
                        autocomplete="off" aria-controls="rejillaPacientes" 
                        maxlength="80" spellcheck="false" style="padding-left: 45px;">
                    <span id="iconoCargaBusqueda" class="material-symbols-rounded icono-cargando oculto" aria-hidden="true" style="position: absolute; right: 16px; color: var(--naranja);">sync</span>
                    <div id="dropdown-resultados" class="dropdown-resultados-pred" style="display: none;"></div>
                </search>
                
                <button type="button" id="btnNuevoPaciente" class="boton-primario">
                    <span class="material-symbols-rounded" aria-hidden="true">add_circle</span> 
                    <span>Nuevo Ingreso</span>
                </button>
            </div>

        </div>
    </header>

    <!-- GRID PRINCIPAL — Solo se puebla desde JS. Sin tarjetas hardcodeadas. -->
    <main id="rejillaPacientes" class="contenedor-bento-resultados bento-overlap grid-pacientes-bento" aria-live="polite">

        <!-- Estado vacío: se activa desde JS cuando no hay pacientes en la BD -->
        <div class="estado-vacio-bento oculto" id="estadoVacioExpedientes">
            <span class="material-symbols-rounded" style="font-size:5rem;color:#89C2D9;display:block;margin-bottom:16px;">pets</span>
            <h2>No hay ni un ratoncito por aquí</h2>
            <p>Esta clínica aún no tiene pacientes registrados.<br>Comienza registrando el primer ingreso.</p>
            <button type="button" id="btnNuevoPacienteVacio" class="boton-primario" style="margin-top:20px;">
                <span class="material-symbols-rounded">add_circle</span>
                <span>Registrar primer paciente</span>
            </button>
        </div>

        <!-- Skeletons de carga: visibles mientras JS carga datos de Supabase -->
        <div class="tarjeta-soft-paciente skeleton-card" id="skeletonExp1" aria-hidden="true">
            <div class="contenedor-imagen-cuadrada skeleton-img"></div>
            <div class="info-soft-paciente">
                <div class="skeleton-line" style="width:60%;height:12px;"></div>
                <div class="skeleton-line" style="width:80%;height:20px;margin:10px 0;"></div>
                <div class="skeleton-line" style="width:50%;height:12px;"></div>
            </div>
        </div>
        <div class="tarjeta-soft-paciente skeleton-card" id="skeletonExp2" aria-hidden="true">
            <div class="contenedor-imagen-cuadrada skeleton-img"></div>
            <div class="info-soft-paciente">
                <div class="skeleton-line" style="width:55%;height:12px;"></div>
                <div class="skeleton-line" style="width:75%;height:20px;margin:10px 0;"></div>
                <div class="skeleton-line" style="width:45%;height:12px;"></div>
            </div>
        </div>
        <div class="tarjeta-soft-paciente skeleton-card" id="skeletonExp3" aria-hidden="true">
            <div class="contenedor-imagen-cuadrada skeleton-img"></div>
            <div class="info-soft-paciente">
                <div class="skeleton-line" style="width:65%;height:12px;"></div>
                <div class="skeleton-line" style="width:70%;height:20px;margin:10px 0;"></div>
                <div class="skeleton-line" style="width:40%;height:12px;"></div>
            </div>
        </div>

    </main>

</div>
