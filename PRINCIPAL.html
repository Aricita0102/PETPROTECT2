<!DOCTYPE html>

<head>

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<!-- Tipografía Inter -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/src/css/principal.css">
    <link rel="stylesheet" href="/src/css/modulo_checkout.css">
  
    <link rel="stylesheet" href="/src/css/modulo_agenda.css">
    <link rel="stylesheet" href="/src/css/modulo_veteri_dashboard.css">
    <link rel="stylesheet" href="/src/css/ventana_seleccion_categoria.css">
    <link rel="stylesheet" href="/src/css/modulo_inventario.css">
    <link rel="stylesheet" href="/src/css/informacion_producto.css">
   <link rel="stylesheet" href="/src/css/registro_paciente.css">
     <link rel="stylesheet" href="/src/css/modulo_expediente.css">
     
    <link rel="stylesheet" href="/src/css/veteri_ajustes.css">
    <link rel="stylesheet" href="/src/css/panel_notificaciones.css">
    <link rel="stylesheet" href="/src/css/modulo_caja_registradora.css">
    
    <!-- SOBREESCRITURA MÓVIL SEGURA -->
    <link rel="stylesheet" href="/src/css/mobile_responsive.css">
    
    <!-- Librerías Globales -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

    <div class="contenedor-sitio">
        
        <header class="cabecera-navegacion" role="banner">
            <nav class="barra-isla" aria-label="Navegación principal">
                
                <div class="seccion-logotipo">
                    <img src="/img/Logo.png" alt="Logotipo Quetzalia - PET PROTECT" class="imagen-logo">
                </div>

                <div class="enlaces-principales" id="menu-navegacion" role="menubar">

    <a href="#"
       class="enlace-nav"
       data-target="MODULO_VETERINARIO_DASHBOARD"
       role="menuitem">
       Inicio
    </a>

    <a href="#"
       class="enlace-nav"
       data-target="MODULO_AGENDA"
       role="menuitem">
       Agenda
    </a>

    <!-- NUEVO MENÚ CLIENTES -->
    <div class="contenedor-desplegable">
        <button class="boton-desplegable"
                aria-haspopup="true"
                aria-expanded="false">

            Clientes

            <span class="material-symbols-rounded icono-flecha">
                expand_more
            </span>
        </button>

        <div class="submenu-flotante"
             role="menu"
             aria-hidden="true">

            <a href="#"
               class="enlace-nav item-submenu"
               data-target="MODULO_BIBLIOTECA_EXPEDIENTES"
               role="menuitem">

                <span class="material-symbols-rounded">
                    folder_shared
                </span>

                Expedientes
            </a>

        </div>
    </div>

    <div class="contenedor-desplegable">
        <button class="boton-desplegable"
                aria-haspopup="true"
                aria-expanded="false">

            Inventario

            <span class="material-symbols-rounded icono-flecha">
                expand_more
            </span>
        </button>

        <div class="submenu-flotante"
             role="menu"
             aria-hidden="true">

            <a href="#"
               class="enlace-nav item-submenu"
               data-target="VENTANA_SELECCION_CATEGORIA"
               role="menuitem">

                <span class="material-symbols-rounded">
                    category
                </span>

                Catálogo de Productos
            </a>



        </div>
    </div>

    <div class="contenedor-desplegable">
        <button class="boton-desplegable"
                aria-haspopup="true"
                aria-expanded="false">

            Caja y finanzas

            <span class="material-symbols-rounded icono-flecha">
                expand_more
            </span>
        </button>

        <div class="submenu-flotante"
             role="menu"
             aria-hidden="true">

            <a href="#"
               class="enlace-nav item-submenu"
               data-target="MODULO_CAJA_REGISTRADORA"
               role="menuitem">

                <span class="material-symbols-rounded">
                    point_of_sale
                </span>

                Caja registradora
            </a>

        </div>
    </div>

</div>
                <div class="acciones-usuario">
                    <a href="#" class="boton-accion-circular admin" title="Panel Admin" aria-label="Abrir panel de administración" style="display: none !important;">
                        <span class="material-symbols-rounded" aria-hidden="true">admin_panel_settings</span>
                    </a>
                    
                    <a href="#" id="btn-metricas-rapidas" class="boton-accion-circular enlace-nav" data-target="MODULO_FINANZAS" title="Mis finanzas" aria-label="Ver Mis Finanzas">
                        <span class="material-symbols-rounded" aria-hidden="true">monitoring</span>
                    </a>
                    
                    <a href="#" id="btn-nav-configuracion" class="boton-accion-circular" title="Configuración del Sistema" aria-label="Abrir panel de configuración">
    <span class="material-symbols-rounded" aria-hidden="true">settings</span>
</a>

                    <button class="boton-accion-circular" id="btn-notificaciones" aria-label="Notificaciones" title="Centro de Alertas">
                        <span class="material-symbols-rounded" aria-hidden="true">notifications</span>
                        <span class="insignia-alerta" id="contador-alertas" aria-live="polite">3</span>
                    </button>

                    <div class="contenedor-perfil-relativo">
                        <button class="perfil-usuario-mini" id="btn-perfil" aria-expanded="false" aria-label="Abrir menú de usuario" aria-controls="panel-perfil">
                            <span class="material-symbols-rounded" aria-hidden="true">account_circle</span>
                        </button>

                        <div class="panel-flotante-bento" id="panel-perfil" aria-hidden="true" role="menu">
                            <div class="info-usuario-panel">
                                <p id="ui-nombre-usuario" class="texto-nombre">Cargando...</p>
                                <p id="ui-correo-usuario" class="texto-correo">...</p>
                                <span id="ui-rol-usuario" class="insignia-rol">...</span>
                            </div>
                            <hr class="divisor-panel" aria-hidden="true">
                            <button id="btn-cerrar-sesion" class="boton-peligro-bento" role="menuitem">
                                <span class="material-symbols-rounded" aria-hidden="true">logout</span>
                                Cerrar Sesión
                            </button>
                        </div>
                    </div>
                </div>
            </nav>
        </header>

        <button class="boton-menu-movil" id="boton-movil" aria-label="Abrir menú de navegación" aria-expanded="false" aria-controls="menu-navegacion">
            <span class="material-symbols-rounded" aria-hidden="true">menu</span>
        </button>

        <main class="seccion-dinamica" id="contenedor-principal" role="main" aria-live="polite">
            <div class="mensaje-carga" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; min-height: 60vh; text-align: center; width: 100%;">
                <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
                <lottie-player src="/json/lottiecarga.json" background="transparent" speed="1" style="width: 450px; height: 450px; margin: 0 auto;" loop autoplay></lottie-player>
                <p style="margin-top: -30px; font-weight: 600; color: var(--cobalto); font-size: 1.2rem; text-align: center; width: 100%;">Ratoncitos trabajando...</p>
            </div>
        </main>

    </div>
    
    <div id="contenedor-modal-dinamico">
        <!-- GLOBAL MODAL: NUEVA CITA (PANEL LATERAL) -->
        <div id="citaOverlay" class="notif-overlay"></div>
        <aside id="panelNuevaCita" class="panel-notificaciones">
            <div class="notif-header">
                <div class="notif-header-top">
                    <h3 class="notif-titulo" style="display:flex; align-items:center; gap:8px;">
                        <span class="material-symbols-rounded" style="color:#F27405;">event</span>
                        Nueva Cita
                    </h3>
                    <div class="notif-header-acciones">
                        <button id="btn-cerrar-modal-cita" class="notif-btn-icono" type="button">
                            <span class="material-symbols-rounded">close</span>
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="notif-cuerpo" style="padding:20px;">
                <form id="form-nueva-cita" style="display:flex; flex-direction:column; gap:16px;">
                    <!-- OBLIGATORIOS -->
                    <div style="display:flex; flex-direction:column; gap:6px;">
                        <div style="display:flex; justify-content:space-between; align-items:flex-end;">
                            <label style="font-size:12px; font-weight:700; color:#032F40;">Paciente / Propietario *</label>
                            <a href="#" onclick="alert('Funcionalidad para registrar paciente rápido próximamente'); return false;" style="font-size:11px; font-weight:600; color:#89C2D9; text-decoration:none; display:flex; align-items:center; gap:2px;"><span class="material-symbols-rounded" style="font-size:14px;">person_add</span> Nuevo</a>
                        </div>
                        <div style="position:relative;">
                            <input type="text" id="input-buscar-paciente-cita" placeholder="Buscar por nombre o tutor..." class="input-moderno-f" style="width:100%; padding:10px 12px; border:1px solid #cbd5e1; border-radius:8px; font-size:13px; outline:none;" autocomplete="off">
                            <div id="resultados-paciente-cita" style="display:none; position:absolute; top:100%; left:0; right:0; background:#fff; border:1px solid #cbd5e1; border-radius:8px; max-height:200px; overflow-y:auto; z-index:10; box-shadow:0 10px 15px rgba(0,0,0,0.05); margin-top:4px;"></div>
                        </div>
                        <input type="hidden" id="cita-paciente-id">
                    </div>

                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                        <div style="display:flex; flex-direction:column; gap:6px;">
                            <label style="font-size:12px; font-weight:700; color:#032F40;">Fecha *</label>
                            <input type="date" id="cita-fecha" required style="width:100%; padding:10px 12px; border:1px solid #cbd5e1; border-radius:8px; font-size:13px; outline:none; color:#475569;">
                        </div>
                        <div style="display:flex; flex-direction:column; gap:6px;">
                            <label style="font-size:12px; font-weight:700; color:#032F40;">Hora *</label>
                            <input type="time" id="cita-hora" required style="width:100%; padding:10px 12px; border:1px solid #cbd5e1; border-radius:8px; font-size:13px; outline:none; color:#475569;">
                        </div>
                    </div>

                    <div style="display:flex; flex-direction:column; gap:6px;">
                        <label style="font-size:12px; font-weight:700; color:#032F40;">Motivo *</label>
                        <input type="text" id="cita-motivo" required placeholder="Ej. Revisión general, Vacunación..." style="width:100%; padding:10px 12px; border:1px solid #cbd5e1; border-radius:8px; font-size:13px; outline:none; color:#475569;">
                    </div>

                    <!-- OPCIONALES (ACORDEÓN) -->
                    <div style="margin-top:8px; border:1px solid #e2e8f0; border-radius:10px; overflow:hidden;">
                        <button type="button" onclick="const b=document.getElementById('opcionales-cita-body'); const i=document.getElementById('icono-opc-cita'); if(b.style.display==='none'){b.style.display='flex'; i.style.transform='rotate(180deg)';}else{b.style.display='none'; i.style.transform='rotate(0deg)';}" style="width:100%; display:flex; justify-content:space-between; align-items:center; padding:12px 14px; background:#f8fafc; border:none; cursor:pointer; font-family:'Inter',sans-serif;">
                            <span style="font-size:12px; font-weight:700; color:#64748b; display:flex; align-items:center; gap:6px;">
                                <span class="material-symbols-rounded" style="font-size:16px;">tune</span>
                                Detalles Opcionales
                            </span>
                            <span class="material-symbols-rounded" id="icono-opc-cita" style="font-size:18px; color:#94a3b8; transition:transform 0.3s;">expand_more</span>
                        </button>
                        
                        <div id="opcionales-cita-body" style="display:none; flex-direction:column; gap:16px; padding:14px; background:#fff; border-top:1px solid #e2e8f0;">
                            
                            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                                <div style="display:flex; flex-direction:column; gap:6px;">
                                    <label style="font-size:11px; font-weight:600; color:#475569;">Tipo</label>
                                    <select id="cita-tipo" style="width:100%; padding:8px 10px; border:1px solid #cbd5e1; border-radius:6px; font-size:12px; outline:none; background:#fff; color:#475569;">
                                        <option value="consulta" selected>Consulta General</option>
                                        <option value="vacunacion">Vacunación</option>
                                        <option value="desparasitacion">Desparasitación</option>
                                        <option value="cirugia">Cirugía</option>
                                        <option value="seguimiento">Seguimiento</option>
                                        <option value="urgencia">Urgencia</option>
                                        <option value="grooming">Estética</option>
                                    </select>
                                </div>
                                <div style="display:flex; flex-direction:column; gap:6px;">
                                    <label style="font-size:11px; font-weight:600; color:#475569;">Duración</label>
                                    <select id="cita-duracion" style="width:100%; padding:8px 10px; border:1px solid #cbd5e1; border-radius:6px; font-size:12px; outline:none; background:#fff; color:#475569;">
                                        <option value="15">15 min</option>
                                        <option value="30" selected>30 min</option>
                                        <option value="45">45 min</option>
                                        <option value="60">1 hora</option>
                                        <option value="todo_el_dia">Todo el día</option>
                                        <option value="otro">Personalizado...</option>
                                    </select>
                                </div>
                            </div>
                            
                            <div id="contenedor-duracion-personalizada" style="display:none; flex-direction:column; gap:6px;">
                                <label style="font-size:11px; font-weight:600; color:#475569;">Horas personalizadas (ej: 1.5)</label>
                                <input type="number" id="cita-duracion-personalizada" step="0.5" min="0.5" style="width:100%; padding:8px 10px; border:1px solid #cbd5e1; border-radius:6px; font-size:12px; outline:none; color:#475569;">
                            </div>
                            
                            <div id="hint-duracion-dinamico" style="display:none; font-size:11px; color:#ef4444; background:#fee2e2; padding:6px; border-radius:4px; border:1px solid #fca5a5;">
                                Se bloqueará la agenda el resto del día.
                            </div>

                            <div style="display:flex; flex-direction:column; gap:6px;">
                                <label style="font-size:11px; font-weight:600; color:#475569;">Notas Adicionales</label>
                                <textarea id="cita-notas" rows="2" placeholder="Requerimientos, estado del paciente, etc." style="width:100%; padding:8px 10px; border:1px solid #cbd5e1; border-radius:6px; font-size:12px; outline:none; resize:vertical; color:#475569;"></textarea>
                            </div>
                            
                            <div style="display:flex; align-items:center; gap:8px;">
                                <input type="checkbox" id="cita-recordatorio" checked style="width:14px; height:14px; accent-color:#032F40; cursor:pointer;">
                                <label for="cita-recordatorio" style="font-size:11px; font-weight:500; color:#475569; cursor:pointer;">Enviar recordatorio automático</label>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            
            <div class="notif-footer" style="padding:16px 20px; border-top:1px solid #e8eef5; display:flex; gap:12px; background:#fff;">
                <button id="btn-cancelar-modal-cita-alt" type="button" style="flex:1; padding:10px; border-radius:10px; border:1px solid #cbd5e1; background:#fff; color:#475569; font-weight:700; font-size:13px; cursor:pointer; transition:all 0.2s;">Cancelar</button>
                <button type="submit" form="form-nueva-cita" style="flex:1; padding:10px; border-radius:10px; border:none; background:#032F40; color:#fff; font-weight:700; font-size:13px; cursor:pointer; box-shadow:0 4px 12px rgba(3,47,64,0.15); transition:transform 0.2s;">Guardar Cita</button>
            </div>
        </aside>
    </div>
    <script type="module" src="/src/js/vistas/principal_v2.js"></script>
</body>
</html>
